
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hugeicons Font Sample</title>
    <meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <link rel="stylesheet" href="./hugeicons-font.css">
    <style>
        * { margin: 0; padding: 0; list-style: none; }
        body { color: #696969; font: 12px/1.5 tahoma, arial, sans-serif; }
        .header { color: #333; text-align: center; padding: 30px 0; }
        .header h1 { font-size: 42px; margin-bottom: 10px; }
        .header sup { font-size: 14px; color: #7b7b7b; }
        .sub-header h2 { font-size: 24px; padding: 30px 0 20px; text-align: center; color: #333; }
        .icons { max-width: 1190px; margin: 0 auto; }
        .icons ul { text-align: center; }
        .icons ul li {
            vertical-align: top;
            width: 120px;
            display: inline-block;
            text-align: center;
            background-color: rgba(0, 0, 0, .02);
            border-radius: 3px;
            padding: 29px 0 10px;
            margin: 10px;
            transition: all 0.6s ease;
        }
        .icons ul li:hover { background-color: rgba(0, 0, 0, .06); }
        .icons ul li:hover i { color: #3c75e4; }
        .icons ul li p { margin-top: 10px; color: #8c8c8c; font-size: 12px; }
        .icons ul li.class-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hugeicons Font<sup>2.0.0</sup></h1>
    </div></body></html>
