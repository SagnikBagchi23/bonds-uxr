<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>Bonds Holdings</title>
  <link rel="stylesheet" href="https://mint-design-system.vercel.app/typography/hugeicons-min.css">
  <style>
    @font-face {
      font-family: 'Sohne';
      src: url('https://mint-design-system.vercel.app/typography/Sohne-Kraftig.otf') format('opentype');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'GrowwSans';
      src: url('https://mint-design-system.vercel.app/typography/GrowwSans-Regular.otf') format('opentype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'GrowwSans';
      src: url('https://mint-design-system.vercel.app/typography/GrowwSans-Medium.otf') format('opentype');
      font-weight: 500;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #060809;
      --surface:      #151819;
      --tertiary:     #1e2224;
      --border:       #252a2c;
      --cp:           #f2f5f7;
      --cs:           #989ea0;
      --positive:     #04b488;
      --blue:         #617bff;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 0;
      font-family: 'GrowwSans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      border-radius: 48px;
      box-shadow: 0 0 0 1px #222, 0 32px 80px rgba(0,0,0,0.8);
    }

    /* Typography */
    .eyebrow    { font-family: 'Sohne', sans-serif; font-weight: 500; font-size: 10px; line-height: 12px; letter-spacing: 0.2em; text-transform: uppercase; }
    .h-small    { font-family: 'Sohne', sans-serif; font-weight: 500; font-size: 16px; line-height: 24px; }
    .h-base     { font-family: 'Sohne', sans-serif; font-weight: 500; font-size: 18px; line-height: 28px; }
    .h-large    { font-family: 'Sohne', sans-serif; font-weight: 500; font-size: 20px; line-height: 32px; }
    .b-sm       { font-family: 'GrowwSans', sans-serif; font-weight: 400; font-size: 12px; line-height: 18px; }
    .b-sm-hvy   { font-family: 'GrowwSans', sans-serif; font-weight: 500; font-size: 12px; line-height: 18px; }
    .b-base     { font-family: 'GrowwSans', sans-serif; font-weight: 400; font-size: 14px; line-height: 20px; }
    .b-base-hvy { font-family: 'GrowwSans', sans-serif; font-weight: 500; font-size: 14px; line-height: 20px; }

    /* Icon helper */
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon-12 { width: 12px; height: 12px; font-size: 12px; }
    .icon-16 { width: 16px; height: 16px; font-size: 16px; }
    .icon-20 { width: 20px; height: 20px; font-size: 20px; }
    .icon-24 { width: 24px; height: 24px; font-size: 24px; }

    /* Outline icon button */
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Divider */
    .divider { height: 1px; background: var(--border); }

    /* Scrollable body */
    .scroll-body { flex: 1; overflow-y: auto; scrollbar-width: none; }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* List item */
    .bond-row {
      display: flex;
      align-items: center;
      padding: 16px 16px;
      cursor: pointer;
    }
    .bond-row:active { background: rgba(255,255,255,0.03); }
  </style>
</head>
<body>
<div class="phone">

  <!-- ── Status bar ── -->
  <div style="height:44px; background:var(--bg); display:flex; align-items:flex-end; padding:0 28px 8px; flex-shrink:0;">
    <span style="font-family:'GrowwSans',sans-serif; font-weight:500; font-size:15px; color:var(--cp); flex:1;">12:30</span>
    <div style="display:flex; gap:6px; align-items:center;">
      <span class="icon icon-16" style="color:var(--cp);"><i class="hgi-stroke hgi-wifi-full"></i></span>
      <span class="icon icon-16" style="color:var(--cp);"><i class="hgi-stroke hgi-signal-full-01"></i></span>
      <span class="icon icon-16" style="color:var(--cp);"><i class="hgi-stroke hgi-battery-full"></i></span>
    </div>
  </div>

  <!-- ── App bar ── -->
  <div style="height:56px; background:var(--bg); display:flex; align-items:center; padding:0 8px 0 12px; flex-shrink:0;">
    <!-- Groww logo -->
    <div style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;">
      <img src="https://mint-design-system.vercel.app/logos/stocks/GROWW.png"
           style="width:32px; height:32px; object-fit:contain;" alt="Groww"
           onerror="this.style.display='none'">
    </div>
    <!-- Title -->
    <span class="h-base" style="color:var(--cp); flex:1;">Stocks</span>
    <!-- Search -->
    <button style="background:none; border:none; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
      <span class="icon icon-24" style="color:var(--cp);"><i class="hgi-stroke hgi-search-01"></i></span>
    </button>
    <!-- QR -->
    <button style="background:none; border:none; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
      <span class="icon icon-24" style="color:var(--cp);"><i class="hgi-stroke hgi-qr-code"></i></span>
    </button>
    <!-- Profile avatar -->
    <div style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;">
      <img src="assets/growwdp.png"
           style="width:28px; height:28px; border-radius:50%; object-fit:cover;" alt="Profile">
    </div>
  </div>

  <!-- ── Sub-tab bar ── -->
  <div style="background:var(--bg); display:flex; align-items:stretch; padding:0 16px; border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; scrollbar-width:none;">
    <div style="display:flex; flex-direction:column; align-items:center; height:48px; justify-content:center; padding:0 16px; cursor:pointer; flex-shrink:0;">
      <span class="h-small" style="color:var(--cs);">Explore</span>
    </div>
    <!-- Holdings — active -->
    <div style="display:flex; flex-direction:column; align-items:center; height:48px; justify-content:center; padding:0 16px; cursor:pointer; position:relative; flex-shrink:0;">
      <span class="h-small" style="color:var(--cp);">Holdings</span>
      <div style="position:absolute; bottom:0; left:0; right:0; height:3px; background:var(--cp); border-radius:4px 4px 0 0;"></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; height:48px; justify-content:center; padding:0 16px; cursor:pointer; flex-shrink:0;">
      <span class="h-small" style="color:var(--cs);">Positions</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; height:48px; justify-content:center; padding:0 16px; cursor:pointer; flex-shrink:0;">
      <span class="h-small" style="color:var(--cs);">Orders</span>
    </div>
  </div>

  <!-- ── Scrollable body ── -->
  <div class="scroll-body">

    <!-- Chip row -->
    <div style="padding:20px 16px 12px; display:flex; gap:4px; align-items:center;">
      <div style="background:var(--bg); border-radius:99px; padding:4px 8px; cursor:pointer;">
        <span class="eyebrow" style="color:var(--cs);">Stocks</span>
      </div>
      <div style="background:var(--tertiary); border-radius:99px; padding:4px 8px; cursor:pointer;">
        <span class="eyebrow" style="color:var(--cp);">Bonds</span>
      </div>
    </div>

    <!-- Summary card -->
    <div style="padding:0 16px 20px;">
      <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden;">

        <!-- Total value row -->
        <div style="padding:20px 16px 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
          <div style="flex:1; min-width:0;">
            <div style="display:flex; align-items:center; gap:4px; margin-bottom:4px;">
              <span class="eyebrow" style="color:var(--cs);">Total Value (2)</span>
              <span class="icon icon-12" style="color:var(--cs);"><i class="hgi-stroke hgi-information-circle"></i></span>
            </div>
            <span class="h-large" style="color:var(--cp);">₹1,10,000</span>
          </div>
          <!-- Icon buttons -->
          <div style="display:flex; gap:8px; align-items:center; padding-top:4px;">
            <button class="icon-btn">
              <span class="icon icon-16" style="color:var(--cp);"><i class="hgi-stroke hgi-eye"></i></span>
            </button>
            <button class="icon-btn">
              <span class="icon icon-16" style="color:var(--cp);"><i class="hgi-stroke hgi-calendar-01"></i></span>
            </button>
            <button class="icon-btn">
              <span class="icon icon-16" style="color:var(--cp);"><i class="hgi-stroke hgi-more-vertical"></i></span>
            </button>
          </div>
        </div>

        <div class="divider" style="margin:0 16px;"></div>

        <!-- Stats list -->
        <div style="padding:16px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <span class="b-base" style="color:var(--cs);">Invested</span>
            <span class="b-base-hvy" style="color:var(--cp);">₹1,00,000</span>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="b-base" style="color:var(--cs);">Interest earned</span>
            <span class="b-base-hvy" style="color:var(--positive);">+₹10,000</span>
          </div>

          <!-- Divider before staggered row -->
          <div class="divider" style="margin:12px 0;"></div>

          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="b-base" style="color:var(--cs);">Principal returned</span>
            <span class="b-base-hvy" style="color:var(--cp);">₹20,000</span>
          </div>
        </div>

      </div>
    </div>

    <!-- List header -->
    <div style="display:flex; justify-content:space-between; align-items:center; padding:0 16px; margin-bottom:4px;">
      <button style="background:none; border:none; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <span class="icon icon-20" style="color:var(--cp);"><i class="hgi-stroke hgi-filter"></i></span>
      </button>
      <button style="background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; padding:4px 0;">
        <span class="icon icon-16" style="color:var(--cs);"><i class="hgi-stroke hgi-expand-01"></i></span>
        <span class="b-sm-hvy" style="color:var(--cp);">Total/Invested</span>
      </button>
    </div>

    <!-- Bond list -->
    <div>
      <!-- Bond 1 -->
      <div class="bond-row">
        <div style="flex:1; min-width:0;">
          <div class="b-base" style="color:var(--cp); margin-bottom:2px;">Kosamattam Finance Jan '28</div>
          <div class="b-sm" style="color:var(--cs);">80 units</div>
        </div>
        <div style="text-align:right; flex-shrink:0; width:96px;">
          <div class="b-base-hvy" style="color:var(--positive); margin-bottom:2px;">₹88,000</div>
          <div class="b-sm" style="color:var(--cs);">₹80,000</div>
        </div>
      </div>
      <div class="divider" style="margin-left:16px;"></div>

      <!-- Bond 2 -->
      <div class="bond-row">
        <div style="flex:1; min-width:0;">
          <div class="b-base" style="color:var(--cp); margin-bottom:2px;">Edelweiss Finance Jun '27</div>
          <div class="b-sm" style="color:var(--cs);">50 units</div>
        </div>
        <div style="text-align:right; flex-shrink:0; width:96px;">
          <div class="b-base-hvy" style="color:var(--positive); margin-bottom:2px;">₹22,000</div>
          <div class="b-sm" style="color:var(--cs);">₹20,000</div>
        </div>
      </div>
    </div>

  </div><!-- end scroll-body -->

  <!-- ── Bottom nav ── -->
  <div style="height:72px; background:var(--bg); border-top:1px solid var(--border); display:flex; align-items:stretch; flex-shrink:0;">
    <!-- Stocks (active) -->
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer;">
      <span class="icon icon-24" style="color:var(--blue);"><i class="hgi-stroke hgi-chart-line-data-01"></i></span>
      <span style="font-family:'GrowwSans',sans-serif; font-size:10px; font-weight:500; color:var(--blue);">Stocks</span>
    </div>
    <!-- Mutual Funds -->
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer;">
      <span class="icon icon-24" style="color:var(--cs);"><i class="hgi-stroke hgi-pie-chart-01"></i></span>
      <span style="font-family:'GrowwSans',sans-serif; font-size:10px; font-weight:500; color:var(--cs);">Mutual Funds</span>
    </div>
    <!-- F&O -->
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer;">
      <span class="icon icon-24" style="color:var(--cs);"><i class="hgi-stroke hgi-activity-01"></i></span>
      <span style="font-family:'GrowwSans',sans-serif; font-size:10px; font-weight:500; color:var(--cs);">F&amp;O</span>
    </div>
    <!-- Money -->
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer;">
      <span class="icon icon-24" style="color:var(--cs);"><i class="hgi-stroke hgi-money-01"></i></span>
      <span style="font-family:'GrowwSans',sans-serif; font-size:10px; font-weight:500; color:var(--cs);">Money</span>
    </div>
  </div>

</div>
</body>
</html>
